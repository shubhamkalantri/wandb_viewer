name: wandb_viewer
description: "W&B Viewer - Monitor your training runs"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  graphql_flutter: ^5.2.0-beta.7
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  syncfusion_flutter_charts: ^28.1.33
  just_audio: ^0.9.43
  video_player: ^2.9.3
  cached_network_image: ^3.4.1
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^18.0.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5
  build_verify: ^3.1.0

flutter:
  uses-material-design: true
